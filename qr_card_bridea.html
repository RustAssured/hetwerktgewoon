<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Het Werkt Gewoon — Bridea Medical</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --ink: #1a1a18;
    --muted: #6b6b66;
    --accent: #2d6a4f;
    --accent-light: #e8f4ee;
    --border: rgba(26,26,24,0.12);
    --bg: #faf9f6;
    --white: #ffffff;
  }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }
  .card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 3rem;
    max-width: 420px;
    width: 100%;
    text-align: center;
  }
  .logo {
    font-family: 'DM Serif Display', serif;
    font-size: 1.1rem;
    color: var(--ink);
    margin-bottom: 0.4rem;
  }
  .logo span { color: var(--accent); }
  .tagline {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 2rem;
    font-weight: 300;
  }
  .divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 0 0 2rem;
  }
  .for-label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--accent);
    background: var(--accent-light);
    padding: 0.25rem 0.8rem;
    border-radius: 100px;
    display: inline-block;
    margin-bottom: 1.25rem;
  }
  .client-name {
    font-family: 'DM Serif Display', serif;
    font-size: 1.6rem;
    letter-spacing: -0.02em;
    margin-bottom: 0.4rem;
    line-height: 1.2;
  }
  .proposal-title {
    font-size: 13px;
    color: var(--muted);
    font-weight: 300;
    margin-bottom: 2rem;
  }
  .qr-wrapper {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.25rem;
    display: inline-block;
    margin-bottom: 1.5rem;
  }
  .qr-wrapper img {
    width: 180px;
    height: 180px;
    display: block;
  }
  .scan-label {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 1.5rem;
    font-style: italic;
  }
  .url {
    font-size: 12px;
    color: var(--accent);
    font-weight: 500;
    background: var(--accent-light);
    padding: 0.5rem 1rem;
    border-radius: 8px;
    display: inline-block;
    margin-bottom: 2rem;
    text-decoration: none;
    letter-spacing: 0.01em;
  }
  .divider2 {
    border: none;
    border-top: 1px solid var(--border);
    margin: 0 0 1.5rem;
  }
  .footer-text {
    font-size: 11px;
    color: var(--muted);
    line-height: 1.7;
    font-weight: 300;
  }
  .footer-text strong {
    color: var(--ink);
    font-weight: 500;
  }

  @media print {
    body { background: white; }
    .card {
      border: 1px solid #ddd;
      box-shadow: none;
      max-width: 100%;
    }
  }
</style>
</head>
